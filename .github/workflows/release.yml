# Builds Windows + Linux installers and publishes them (with the updater
# metadata files) to a GitHub Release whenever a v* tag is pushed.
#
# Two-phase publish: both platforms upload into a hidden DRAFT release, and a
# final job flips it public only after every asset is in place. Users (and the
# auto-updater) never see a release that is missing files.
#
# Usage:
#   1. Bump "version" in package.json (e.g. 1.2.4)
#   2. git commit -am "v1.2.4" && git tag v1.2.4 && git push && git push --tags
#   3. This workflow creates the release; installed launchers then offer the update.
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # electron-builder uploads release assets with GITHUB_TOKEN

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # The tag must be exactly v + package.json version (e.g. v1.2.1), or
      # electron-builder publishes assets under a different tag than the one
      # that triggered the build — the classic "latest.yml is missing" bug.
      - name: Verify tag matches package.json version
        shell: bash
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "${GITHUB_REF_NAME}" != "${PKG_VERSION}" ]; then
            echo "::error::Tag '${GITHUB_REF_NAME}' does not match package.json version '${PKG_VERSION}'."
            echo "::error::Bump package.json first, then tag with exactly ${PKG_VERSION} (v + version, no extra dot)."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build and upload to draft release
        run: npx electron-vite build && npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Force a draft while uploading; the publish job makes it public
          # only after BOTH platforms uploaded all their files.
          EP_DRAFT: 'true'

  publish:
    # Runs only when every build job succeeded — then the complete release
    # (exe + blockmap + latest.yml + AppImage + deb + latest-linux.yml)
    # becomes visible atomically.
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Publish the draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --draft=false
