appId: com.fvc.launcher
productName: FvC Launcher
copyright: Copyright © 2026 FvC

# Auto-updates: electron-updater reads this to find releases, and it is baked
# into the packaged app as app-update.yml.
publish:
  provider: github
  owner: FvC-Launcher
  repo: FvC-Launcher
  # Publish as a real release immediately — the default (draft) leaves the
  # assets invisible to installed apps until someone publishes it by hand.
  releaseType: release

directories:
  buildResources: build
  output: dist

files:
  - out/**
  - resources/**
  - '!**/.vscode/*'
  - '!src/*'
  - '!scripts/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'

win:
  target:
    - target: nsis
      arch: [x64]
  icon: build/icon.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  shortcutName: FvC Launcher
  artifactName: FvC-Launcher-Setup-${version}.${ext}

linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  icon: build/icon.png
  category: Game
  maintainer: FvC
  artifactName: FvC-Launcher-${version}.${ext}

npmRebuild: false
